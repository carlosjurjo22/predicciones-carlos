name: Publicar predicciones diarias

on:
  schedule:
    - cron: "20 11 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Encontrar carpeta del proyecto
        run: |
          if [ -f "scripts/update-predictions.js" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
          elif [ -f "predicciones-carlos-cloud-ready-v2/scripts/update-predictions.js" ]; then
            echo "PROJECT_DIR=predicciones-carlos-cloud-ready-v2" >> "$GITHUB_ENV"
          else
            FOUND=$(find . -path "*/scripts/update-predictions.js" -print -quit)
            if [ -z "$FOUND" ]; then
              echo "No encontre scripts/update-predictions.js"
              echo "Archivos encontrados:"
              find . -maxdepth 3 -type f | sort
              exit 1
            fi
            DIR=$(dirname "$(dirname "$FOUND")")
            echo "PROJECT_DIR=${DIR#./}" >> "$GITHUB_ENV"
          fi

      - name: Actualizar las tres predicciones diarias
        run: |
          echo "Usando carpeta: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          node scripts/update-predictions.js
        env:
          TIMEZONE: America/Havana
          PREDICTIONS_PROVIDER: auto
          PREDICTIONS_MAX_MATCHES: "3"
          PREDICTIONS_KEEP_CURRENT_ON_FAIL: "true"
          THESPORTSDB_KEY: "123"

      - name: Crear sitio estatico
        run: |
          cd "$PROJECT_DIR"
          node scripts/build-static-site.js

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Cargar sitio
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.PROJECT_DIR }}/dist

      - name: Publicar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
