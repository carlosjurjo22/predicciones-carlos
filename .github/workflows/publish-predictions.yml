name: Publicar predicciones diarias

on:
  schedule:
    - cron: "20 11 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Actualizar las tres predicciones diarias
        working-directory: predicciones-carlos-cloud-ready-v2
        run: node scripts/update-predictions.js
        env:
          TIMEZONE: America/Havana
          PREDICTIONS_PROVIDER: auto
          PREDICTIONS_MAX_MATCHES: "3"
          PREDICTIONS_KEEP_CURRENT_ON_FAIL: "true"
          THESPORTSDB_KEY: "123"

      - name: Crear sitio estatico
        working-directory: predicciones-carlos-cloud-ready-v2
        run: node scripts/build-static-site.js

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Cargar sitio
        uses: actions/upload-pages-artifact@v4
        with:
          path: predicciones-carlos-cloud-ready-v2/dist

      - name: Publicar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
